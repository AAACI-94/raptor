services:
  raptor-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - raptor-data:/app/data
    env_file: .env
    environment:
      - DATABASE_PATH=/app/data/raptor.db
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=raptor
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - RAPTOR_PROVIDER=${RAPTOR_PROVIDER:-ollama}
      - RAPTOR_OLLAMA_URL=http://host.docker.internal:11434
      - RAPTOR_OLLAMA_MODEL=${RAPTOR_OLLAMA_MODEL:-qwen3.5}
      - RAPTOR_MAX_REVISION_CYCLES=${RAPTOR_MAX_REVISION_CYCLES:-3}
      - RAPTOR_REFLECTION_ENABLED=${RAPTOR_REFLECTION_ENABLED:-true}
    depends_on:
      jaeger:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - raptor-net
    restart: unless-stopped

  raptor-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    depends_on:
      raptor-api:
        condition: service_healthy
    networks:
      - raptor-net
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.62
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - raptor-net
    restart: unless-stopped

networks:
  raptor-net:
    driver: bridge

volumes:
  raptor-data:
    driver: local
